services:
  registry:
    image: descartesresearch/teastore-registry
    platform: linux/amd64
    expose:
      - "8080"
    depends_on:
      - rabbitmq

  db:
    image: descartesresearch/teastore-db
    platform: linux/amd64
    expose:
      - "3306"
    ports:
      - "3306:3306"

  rabbitmq:
    image: rabbitmq:3-management
    platform: linux/amd64
    hostname: rabbitmq
    expose:
      - "5672"
      - "15672"
    ports:
      - "5672:5672"
      - "15672:15672"

  persistence:
    image: descartesresearch/teastore-persistence
    platform: linux/amd64
    expose:
      - "8080"
    depends_on:
      - registry
      - db
      - rabbitmq
    environment:
      HOST_NAME: "persistence"
      REGISTRY_HOST: "registry"
      DB_HOST: "db"
      DB_PORT: "3306"
      RABBITMQ_HOST: "rabbitmq"

  auth:
    image: descartesresearch/teastore-auth
    platform: linux/amd64
    expose:
      - "8080"
    depends_on:
      - registry
      - rabbitmq
    environment:
      HOST_NAME: "auth"
      REGISTRY_HOST: "registry"
      RABBITMQ_HOST: "rabbitmq"

  image:
    image: descartesresearch/teastore-image
    platform: linux/amd64
    expose:
      - "8080"
    depends_on:
      - registry
      - rabbitmq
    environment:
      HOST_NAME: "image"
      REGISTRY_HOST: "registry"
      RABBITMQ_HOST: "rabbitmq"

  recommender:
    image: descartesresearch/teastore-recommender
    platform: linux/amd64
    expose:
      - "8080"
    depends_on:
      - registry
      - rabbitmq
    environment:
      HOST_NAME: "recommender"
      REGISTRY_HOST: "registry"
      RABBITMQ_HOST: "rabbitmq"

  webui:
    image: descartesresearch/teastore-webui
    platform: linux/amd64
    expose:
      - "8080"
    depends_on:
      - registry
      - rabbitmq
    environment:
      HOST_NAME: "webui"
      REGISTRY_HOST: "registry"
      RABBITMQ_HOST: "rabbitmq"
    ports:
      - "8080:8080"
